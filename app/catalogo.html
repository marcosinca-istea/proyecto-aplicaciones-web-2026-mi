<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo | Neo Domino Cards</title>
    <link rel="stylesheet" href="style/style.css">
</head>

<body>

    <header>
        <h2>Neo Domino Cards</h2>
        <nav>
            <a href="index.html">Inicio</a>
            <a href="catalogo.html" class="active">Catálogo</a>
            <a href="admin.html">Panel Admin</a>
            <span id="cart-counter" style="background: var(--color-secundario); padding: 5px 15px; border-radius: 20px; color: white; cursor: pointer; transition: 0.2s; font-weight: bold;">🛒 Carrito (0)</span>
        </nav>
    </header>

    <main>
        <div class="layout-principal">
            
            <aside class="sidebar-filtros">
                
                <div class="buscador-container">
                    <input type="text" id="buscador" placeholder="Buscar por nombre...">
                </div>

                <h3>Precio</h3>
                <div class="grupo-filtro">
                    <button class="btn-filtro activo" data-filtro="todos" style="width: 100%; text-align: left;">Todas</button>
                    <button class="btn-filtro" data-filtro="menor" style="width: 100%; text-align: left;">Menos de $30.000</button>
                    <button class="btn-filtro" data-filtro="mayor" style="width: 100%; text-align: left;">$30.000 o más</button>
                </div>

                <h3>Nivel / Estrellas</h3>
                <div class="grupo-filtro" id="filtros-estrellas">
                    <label class="filtro-checkbox">
                        <input type="checkbox" value="5" class="check-nivel"> 5 Estrellas
                    </label>
                    <label class="filtro-checkbox">
                        <input type="checkbox" value="7" class="check-nivel"> 7 Estrellas
                    </label>
                    <label class="filtro-checkbox">
                        <input type="checkbox" value="8" class="check-nivel"> 8 Estrellas
                    </label>
                    <label class="filtro-checkbox">
                        <input type="checkbox" value="10" class="check-nivel"> 10+ Estrellas
                    </label>
                </div>

            </aside>

            <div class="contenedor-grilla">
                <section class="seccion-productos" id="catalogo">
                </section>
            </div>
        </div>
    </main>

    <div id="carrito-sidebar" class="carrito-sidebar">
        <div class="carrito-header">
            <h3>Mi Carrito</h3>
            <button id="cerrar-carrito" class="btn-cerrar">&times;</button>
        </div>
        <div id="carrito-items" class="carrito-items"></div>
        <div class="carrito-footer">
            <div class="carrito-total">
                <span>Total a pagar:</span>
                <span id="carrito-total-precio">$0 ARS</span>
            </div>
            <button id="vaciar-carrito" class="btn-vaciar">🗑️ Vaciar carrito</button>
            <button id="btn-continuar-compra" class="btn-comprar" style="margin-top: 10px;">Continuar compra</button>
        </div>
    </div>
    
    <script src="carrito.js"></script>
    
    <script>
        const cartasBase = [
            { id: 'stardust', nombre: 'Stardust Dragon', nivel: 8, precio: 45000, imagen: 'img/stardust.webp', desc: 'Cartas Sueltas - Edición Original.' },
            { id: 'red-dragon', nombre: 'Red Dragon Archfiend', nivel: 8, precio: 38000, imagen: 'img/red-dragon.webp', desc: 'Cartas Sueltas - Edición Original.' },
            { id: 'black-rose', nombre: 'Black Rose Dragon', nivel: 7, precio: 42000, imagen: 'img/black-rose.webp', desc: 'Cartas Sueltas - Edición Original.' },
            { id: 'junk-warrior', nombre: 'Junk Warrior', nivel: 5, precio: 15000, imagen: 'img/junk-warrior.webp', desc: 'Cartas Sueltas - Starter Deck.' },
            { id: 'shooting-star', nombre: 'Shooting Star Dragon', nivel: 10, precio: 85000, imagen: 'img/shooting-star-dragon.webp', desc: 'Cartas Sueltas - Ghost Rare.' },
            { id: 'red-nova', nombre: 'Red Nova Dragon', nivel: 10, precio: 70000, imagen: 'img/red-nova-dragon.webp', desc: 'Cartas Sueltas - Secret Rare.' },
            { id: 'moonlight-rose', nombre: 'Moonlight Rose Dragon', nivel: 7, precio: 25000, imagen: 'img/black-rose-moonlight-dragon.webp', desc: 'Cartas Sueltas - Ultra Rare.' },
            { id: 'nitro-warrior', nombre: 'Nitro Warrior', nivel: 7, precio: 8000, imagen: 'img/nitro-warrior.webp', desc: 'Cartas Sueltas - Super Rare.' }
        ];

        // 2. Traemos las cartas que el Admin subió desde el localStorage
        const cartasCustom = JSON.parse(localStorage.getItem('catalogo_custom')) || [];

        // 3. Unimos todo en un solo catálogo
        const catalogoCompleto = [...cartasBase, ...cartasCustom];

        // Elementos del DOM
        const seccionCatalogo = document.getElementById('catalogo');
        const inputBuscador = document.getElementById('buscador');
        const botonesFiltro = document.querySelectorAll('.btn-filtro');
        const checkboxesNivel = document.querySelectorAll('.check-nivel');
        
        let filtroPrecioActual = 'todos';

        // 4. Función para dibujar las cartas en pantalla
        const renderizarCatalogo = (cartasA_Mostrar) => {
            seccionCatalogo.innerHTML = ''; // Limpiamos la grilla
            
            if (cartasA_Mostrar.length === 0) {
                seccionCatalogo.innerHTML = '<p style="grid-column: 1 / -1; text-align: center; padding: 40px; color: var(--color-texto-mutado); font-size: 1.2rem;">No se encontraron cartas con esos filtros.</p>';
                return;
            }

            cartasA_Mostrar.forEach(carta => {
                // Ajuste para el data-nivel (agrupar 10 o más)
                let nivelNormalizado = Number(carta.nivel) >= 10 ? 10 : carta.nivel;

                seccionCatalogo.insertAdjacentHTML('beforeend', `
                    <div class="card" data-nivel="${nivelNormalizado}">
                        <a href="detalle.html?id=${carta.id}" style="text-decoration: none; color: inherit;">
                            <img src="${carta.imagen}" alt="Carta ${carta.nombre}">
                            <h3>${carta.nombre}</h3>
                        </a>
                        <p>${carta.desc || 'Cartas Sueltas - Nueva Adición.'}</p>
                        <p class="precio">$${carta.precio.toLocaleString('es-AR')} ARS</p>
                        <button class="btn-comprar" data-nombre="${carta.nombre}" data-precio="${carta.precio}" data-imagen="${carta.imagen}">Agregar al carrito</button>
                    </div>
                `);
            });
        };

        // 5. Función de Filtros
        const aplicarFiltros = () => {
            const textoBusqueda = inputBuscador.value.toLowerCase();
            const nivelesSeleccionados = Array.from(checkboxesNivel).filter(cb => cb.checked).map(cb => Number(cb.value));

            const cartasFiltradas = catalogoCompleto.filter(carta => {
                // Filtro Texto
                const coincideTexto = carta.nombre.toLowerCase().includes(textoBusqueda);
                
                // Filtro Precio
                let coincidePrecio = true;
                if (filtroPrecioActual === 'menor') coincidePrecio = carta.precio < 30000;
                if (filtroPrecioActual === 'mayor') coincidePrecio = carta.precio >= 30000;
                
                // Filtro Nivel
                let coincideNivel = true;
                if (nivelesSeleccionados.length > 0) {
                    let nivelNorm = Number(carta.nivel) >= 10 ? 10 : Number(carta.nivel);
                    coincideNivel = nivelesSeleccionados.includes(nivelNorm);
                }

                return coincideTexto && coincidePrecio && coincideNivel;
            });

            renderizarCatalogo(cartasFiltradas);
        };

        // 6. Escuchadores de Eventos para los filtros
        inputBuscador.addEventListener('input', aplicarFiltros);
        checkboxesNivel.forEach(cb => cb.addEventListener('change', aplicarFiltros));

        botonesFiltro.forEach(boton => {
            boton.addEventListener('click', (e) => {
                filtroPrecioActual = e.target.getAttribute('data-filtro');
                botonesFiltro.forEach(b => b.classList.remove('activo'));
                e.target.classList.add('activo');
                aplicarFiltros();
            });
        });

        // 7. Delegación de Eventos para los botones de compra (Concepto Clase 5)
        seccionCatalogo.addEventListener('click', (e) => {
            if (e.target.classList.contains('btn-comprar')) {
                e.preventDefault();
                const boton = e.target;
                const nombre = boton.getAttribute('data-nombre');
                const precio = Number(boton.getAttribute('data-precio'));
                const imagen = boton.getAttribute('data-imagen');
                
                // Llamamos a la función global de tu carrito.js
                agregarItemAlCarrito(nombre, precio, imagen, boton);
            }
        });

        // Iniciamos el catálogo por primera vez
        renderizarCatalogo(catalogoCompleto);
    </script>
</body>
</html>
