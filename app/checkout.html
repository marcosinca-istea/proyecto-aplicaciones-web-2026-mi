<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finalizar Compra | Neo Domino Cards</title>
    <link rel="stylesheet" href="style/style.css">
</head>
<body>

    <header>
        <h2>Neo Domino Cards</h2>
        <nav>
            <a href="index.html" class="btn-volver">← Volver a la tienda</a>
        </nav>
    </header>

    <main class="main-detalle">
        <div class="contenedor-detalle layout-checkout">
            
            <section class="seccion-resenas seccion-formulario">
                <h2>Datos de facturación y envío</h2>
                <p class="texto-ayuda">Completá tus datos para finalizar la compra.</p>
                
                <form id="form-checkout" class="formulario-resena">
                    <div class="grupo-input">
                        <label for="nombre">Nombre completo:</label>
                        <input type="text" id="nombre" placeholder="Ej: Yusei Fudo" required>
                    </div>
                    
                    <div class="grupo-input">
                        <label for="direccion">Dirección de envío:</label>
                        <input type="text" id="direccion" placeholder="Ej: Satellite St. 123" required>
                    </div>

                    <div class="grupo-input">
                        <label for="tarjeta">Número de Tarjeta:</label>
                        <input type="text" id="tarjeta" placeholder="XXXX-XXXX-XXXX-XXXX" required minlength="16" maxlength="16">
                    </div>
                    
                    <button type="submit" class="btn-comprar btn-grande">Confirmar Pago</button>
                </form>
            </section>

            <section class="seccion-resenas seccion-resumen">
                <h2>Resumen de tu pedido</h2>
                <hr class="separador">
                <div id="checkout-items" class="lista-items-checkout"></div>
                <hr class="separador">
                <h3 id="checkout-total" class="precio-total">Total: $0 ARS</h3>
            </section>

        </div>
    </main>

    <script src="storage.js"></script>
    <script>
        // 1. Carga y Seguridad
        const carrito = StorageDB.leer('carrito', []);
        if (!carrito.length) window.location.href = 'index.html';

        // 2. Renderizado Optimizado (Map + Reduce)
        document.getElementById('checkout-items').innerHTML = carrito.map(item => `
            <div class="item-resumen">
                <span>${item.cantidad}x <strong>${item.nombre}</strong></span>
                <span>$${(item.precio * item.cantidad).toLocaleString('es-AR')}</span>
            </div>
        `).join('');

        const totalAPagar = carrito.reduce((suma, item) => suma + (item.precio * item.cantidad), 0);
        document.getElementById('checkout-total').textContent = `Total: $${totalAPagar.toLocaleString('es-AR')} ARS`;

        // 3. Persistencia de Formulario (sessionStorage)
        const form = document.getElementById('form-checkout');
        const inputNombre = document.getElementById('nombre');
        const inputDir = document.getElementById('direccion');

        // Recuperar si el usuario apretó F5
        inputNombre.value = sessionStorage.getItem('form_nombre') || '';
        inputDir.value = sessionStorage.getItem('form_dir') || '';

        // Guardar mientras tipea
        form.addEventListener('input', (e) => {
            if (e.target.id === 'nombre') sessionStorage.setItem('form_nombre', e.target.value);
            if (e.target.id === 'direccion') sessionStorage.setItem('form_dir', e.target.value);
        });

        // 4. Procesar Pago
        form.addEventListener('submit', (e) => {
            e.preventDefault();
            alert("¡Pago procesado con éxito! Tus cartas ya están en preparación.");
            
            StorageDB.borrar('carrito'); 
            sessionStorage.clear(); // Limpiamos los inputs guardados
            
            window.location.href = 'index.html';
        });
    </script>
</body>
</html>
