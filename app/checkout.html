<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finalizar Compra | Neo Domino Cards</title>
    <link rel="stylesheet" href="style/style.css">
</head>
<body>

    <header>
        <h2>Neo Domino Cards</h2>
        <nav>
            <a href="index.html" class="btn-volver">← Volver a la tienda</a>
        </nav>
    </header>

    <main class="main-detalle">
        <div class="contenedor-detalle layout-checkout">
            
            <section class="seccion-resenas seccion-formulario">
                <h2>Datos de facturación y envío</h2>
                <p class="texto-ayuda">Completá tus datos para finalizar la compra de tus cartas.</p>
                
                <form id="form-checkout" class="formulario-resena">
                    <div class="grupo-input">
                        <label for="nombre">Nombre completo:</label>
                        <input type="text" id="nombre" placeholder="Ej: Yusei Fudo" required>
                    </div>
                    
                    <div class="grupo-input">
                        <label for="direccion">Dirección de envío:</label>
                        <input type="text" id="direccion" placeholder="Ej: Satellite St. 123" required>
                    </div>

                    <div class="grupo-input">
                        <label for="tarjeta">Número de Tarjeta:</label>
                        <input type="text" id="tarjeta" placeholder="XXXX-XXXX-XXXX-XXXX" required minlength="16" maxlength="16">
                    </div>
                    
                    <button type="submit" class="btn-comprar btn-grande">Confirmar Pago</button>
                </form>
            </section>

            <section class="seccion-resenas seccion-resumen">
                <h2>Resumen de tu pedido</h2>
                <hr class="separador">
                
                <div id="checkout-items" class="lista-items-checkout"></div>
                
                <hr class="separador">
                <h3 id="checkout-total" class="precio-total">Total: $0 ARS</h3>
            </section>

        </div>
    </main>

    <script src="storage.js"></script>
    <script>
        // 1. Usamos nuestra nueva herramienta segura para leer la memoria
        const carrito = StorageDB.leer('carrito', []);

        // 2. Seguridad
        if (carrito.length === 0) {
            window.location.href = 'index.html';
        }

        // 3. Renderizamos el resumen
        const checkoutItems = document.getElementById('checkout-items');
        const checkoutTotal = document.getElementById('checkout-total');
        let totalAPagar = 0;

        carrito.forEach(item => {
            const subtotal = item.precio * item.cantidad;
            totalAPagar += subtotal;
            
            checkoutItems.innerHTML += `
                <div class="item-resumen">
                    <span>${item.cantidad}x <strong>${item.nombre}</strong></span>
                    <span>$${subtotal.toLocaleString('es-AR')}</span>
                </div>
            `;
        });

        checkoutTotal.textContent = `Total: $${totalAPagar.toLocaleString('es-AR')} ARS`;

        // 4. Lógica de pago
        document.getElementById('form-checkout').addEventListener('submit', (e) => {
            e.preventDefault();

            alert("¡Pago procesado con éxito! Tus cartas ya están en preparación para el envío.");
            
            // Usamos nuestra herramienta para borrar
            StorageDB.borrar('carrito');
            
            window.location.href = 'index.html';
        });
    </script>
</body>
</html>
