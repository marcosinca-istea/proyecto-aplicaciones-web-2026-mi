<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detalle de Carta | Neo Domino Cards</title>
    <link rel="stylesheet" href="style/style.css">
</head>
<body>

    <header>
        <h2>Neo Domino Cards</h2>
        <nav>
            <a href="index.html">Inicio</a>
            <a href="catalogo.html">Catálogo</a>
            <a href="contacto.html">Contacto</a>
            <span id="cart-counter" style="background: var(--color-secundario); padding: 5px 10px; border-radius: 15px; color: white; cursor: pointer; transition: 0.2s;">🛒 (0)</span>
            
            <!-- Botón Modo Oscuro reubicado correctamente -->
            <button id="btn-dark-mode" style="background: none; border: none; font-size: 1.2rem; cursor: pointer; margin-left: 10px;" title="Alternar tema">🌙</button>
        </nav>
    </header>

    <main class="main-detalle">
        <div class="contenedor-detalle">
            <a href="catalogo.html" class="btn-volver">← Volver al catálogo</a>

            <section class="producto-detalle">
                <div class="imagen-container">
                    <img id="detalle-img" src="" alt="Cargando...">
                </div>
                
                <div class="info-container">
                    <span id="detalle-edicion" class="badge-edicion"></span>
                    
                    <h1 id="detalle-titulo">Cargando...</h1>
                    <p id="detalle-precio" class="precio-detalle"></p>
                    <p id="detalle-desc" class="descripcion"></p>

                    <ul class="caracteristicas">
                        <li><strong>Tipo:</strong> <span id="detalle-tipo"></span></li>
                        <li><strong>Nivel/Rango:</strong> <span id="detalle-nivel"></span></li>
                    </ul>

                    <button id="btn-agregar-dinamico" class="btn-comprar btn-grande" style="display: none;">Agregar al carrito</button>
                </div>
            </section>
        </div>
    </main>

    <div id="carrito-sidebar" class="carrito-sidebar">
        <div class="carrito-header">
            <h3>Mi Carrito</h3>
            <button id="cerrar-carrito" class="btn-cerrar">&times;</button>
        </div>
        <div id="carrito-items" class="carrito-items"></div>
        <div class="carrito-footer">
            <div class="carrito-total">
                <span>Total a pagar:</span>
                <span id="carrito-total-precio">$0 ARS</span>
            </div>
            <button id="vaciar-carrito" class="btn-vaciar">🗑️ Vaciar carrito</button>
            <button id="btn-continuar-compra" class="btn-comprar" style="margin-top: 10px;">Continuar compra</button>
        </div>
    </div>

    <script src="storage.js"></script>
    <script src="darkmode.js"></script>
    <script src="carrito.js"></script>
    
    <script type="module">
        import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';

        // Credenciales
        const SUPABASE_URL = 'https://sekoqjsonihqujslleow.supabase.co';
        const ANON_KEY = 'sb_publishable_TeGqL0RKJW1sPqoOWARLhQ_TiFtueAC'; 
        const db = createClient(SUPABASE_URL, ANON_KEY);

        // Obtenemos el ID de la URL
        const parametrosURL = new URLSearchParams(window.location.search);
        const idCartaSeleccionada = parametrosURL.get('id');

        const cargarDetalle = async () => {
            if (!idCartaSeleccionada) return mostrarError();

            try {
                // Fetch a Supabase buscando solo el ID correspondiente
                const { data, error } = await db.from('productos')
                                                .select('*')
                                                .eq('id', idCartaSeleccionada)
                                                .single();

                if (error || !data) throw error;

                // Renderizamos los datos
                document.title = `${data.nombre} | Neo Domino Cards`; 
                document.getElementById('detalle-img').src = data.imagen;
                document.getElementById('detalle-img').alt = data.nombre;
                document.getElementById('detalle-titulo').textContent = data.nombre;
                
                // Valores por defecto en caso de que estas columnas no estén en la DB
                document.getElementById('detalle-edicion').textContent = data.edicion || 'Original Synchro';
                document.getElementById('detalle-desc').textContent = data.descripcion || '';
                document.getElementById('detalle-tipo').textContent = data.tipo || 'Dragón / Sincronía / Efecto';
                document.getElementById('detalle-nivel').textContent = data.nivel;
                document.getElementById('detalle-precio').textContent = `$${data.precio.toLocaleString('es-AR')} ARS`;

                // Mostramos el botón y le damos vida
                const botonComprar = document.getElementById('btn-agregar-dinamico');
                botonComprar.style.display = 'block';
                botonComprar.addEventListener('click', () => {
                    agregarItemAlCarrito(data.nombre, data.precio, data.imagen, botonComprar);
                });

            } catch (error) {
                console.error("Error cargando la carta:", error);
                mostrarError();
            }
        };

        const mostrarError = () => {
            document.getElementById('detalle-titulo').textContent = "Carta no encontrada";
            document.getElementById('detalle-desc').textContent = "El producto que buscas no existe o fue eliminado de la base de datos.";
            document.getElementById('detalle-img').src = "img/placeholder.webp"; // Opcional
        };

        // Ejecutamos al cargar la vista
        cargarDetalle();
    </script>
</body>
</html>
