<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detalle de Carta</title>
    <link rel="stylesheet" href="style/style.css">
</head>
<body>

    <header>
        <h2>Neo Domino Cards</h2>
        <nav>
            <a href="index.html">Inicio</a>
            <a href="catalogo.html#catalogo">Catálogo</a>
            <a href="contacto.html">Contacto</a>
            <span id="cart-counter" style="background: var(--color-secundario); padding: 5px 10px; border-radius: 15px; color: white; cursor: pointer; transition: 0.2s;">🛒 (0)</span>
        </nav>
    </header>

    <main class="main-detalle">
        <div class="contenedor-detalle">
            <a href="catalogo.html" class="btn-volver">← Volver al catálogo</a>

            <section class="producto-detalle">
                <div class="imagen-container">
                    <img id="detalle-img" src="" alt="Carta">
                </div>
                
                <div class="info-container">
                    <span id="detalle-edicion" class="badge-edicion"></span>
                    
                    <h1 id="detalle-titulo">Cargando...</h1>
                    <p id="detalle-precio" class="precio-detalle"></p>
                    <p id="detalle-desc" class="descripcion"></p>

                    <ul class="caracteristicas">
                        <li><strong>Tipo:</strong> <span id="detalle-tipo"></span></li>
                        <li><strong>Nivel/Rango:</strong> <span id="detalle-nivel"></span></li>
                    </ul>

                    <button id="btn-agregar-dinamico" class="btn-comprar btn-grande">Agregar al carrito</button>
                </div>
            </section>
        </div>
    </main>

    <div id="carrito-sidebar" class="carrito-sidebar">
        <div class="carrito-header">
            <h3>Mi Carrito</h3>
            <button id="cerrar-carrito" class="btn-cerrar">&times;</button>
        </div>
        <div id="carrito-items" class="carrito-items"></div>
        <div class="carrito-footer">
            <div class="carrito-total">
                <span>Total a pagar:</span>
                <span id="carrito-total-precio">$0 ARS</span>
            </div>
            <button id="vaciar-carrito" class="btn-vaciar">🗑️ Vaciar carrito</button>
            <button id="btn-continuar-compra" class="btn-comprar" style="margin-top: 10px;">Continuar compra</button>
        </div>
    </div>

    <script src="darkmode.js"></script>
    <script src="productos.js"></script>
    <script src="carrito.js"></script>

    <button id="btn-dark-mode" style="background: none; border: none; font-size: 1.2rem; cursor: pointer; margin-left: 10px;" title="Alternar tema">🌙</button>
    <script>
        const parametrosURL = new URLSearchParams(window.location.search);
        const idCartaSeleccionada = parametrosURL.get('id');
        const cartaEncontrada = baseDeDatosCartas.find((carta) => carta.id === idCartaSeleccionada);

        if (cartaEncontrada) {
            document.title = `${cartaEncontrada.nombre} | Neo Domino Cards`; 
            
            document.getElementById('detalle-img').src = cartaEncontrada.imagen;
            document.getElementById('detalle-img').alt = cartaEncontrada.nombre;
            document.getElementById('detalle-titulo').textContent = cartaEncontrada.nombre;
            document.getElementById('detalle-edicion').textContent = cartaEncontrada.edicion;
            document.getElementById('detalle-desc').textContent = cartaEncontrada.descripcion;
            document.getElementById('detalle-tipo').textContent = cartaEncontrada.tipo;
            document.getElementById('detalle-nivel').textContent = cartaEncontrada.nivel;
            document.getElementById('detalle-precio').textContent = `$${cartaEncontrada.precio.toLocaleString('es-AR')} ARS`;

            // Configurar el botón de agregar usando el archivo compartido
            const botonComprar = document.getElementById('btn-agregar-dinamico');
            botonComprar.addEventListener('click', () => {
                // Llamamos a la función maestra de carrito.js
                agregarItemAlCarrito(cartaEncontrada.nombre, cartaEncontrada.precio, cartaEncontrada.imagen, botonComprar);
            });
        } else {
            document.getElementById('detalle-titulo').textContent = "Carta no encontrada";
            document.getElementById('btn-agregar-dinamico').style.display = "none";
        }
    </script>
</body>
</html>
</body>
</html>
